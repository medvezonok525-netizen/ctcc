<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LampoViews</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, sans-serif;
      background: #0a0a0a;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      position: relative;
    }
    
    .brand {
      position: fixed;
      top: 2rem;
      left: 2rem;
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      z-index: 10;
    }
    
    .api-counter {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      padding: 0.8rem 1.2rem;
      border-radius: 1rem;
      font-size: 0.75rem;
      color: #888;
      z-index: 10;
      line-height: 1.4;
    }
    
    .api-counter span { color: #4ade80; font-weight: 700; font-size: 1.1rem; }
    
    .center-container {
      width: 90%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }
    
    .search-box {
      display: flex;
      gap: 1rem;
      width: 100%;
    }
    
    .channel-input {
      flex: 1;
      padding: 1.2rem 1.5rem;
      border-radius: 1rem;
      border: 2px solid #2a2a2a;
      background: #1a1a1a;
      color: white;
      font-size: 1.2rem;
      outline: none;
      text-align: center;
    }
    
    .channel-input:focus { border-color: #ff4444; }
    .channel-input::placeholder { color: #4a4a4a; }
    
    .search-btn {
      padding: 1.2rem 2rem;
      border-radius: 1rem;
      border: none;
      background: #ff4444;
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      white-space: nowrap;
    }
    
    .search-btn:hover { background: #ff2020; }
    
    .subscriber-card {
      background: #1a1a1a;
      border-radius: 2rem;
      padding: 3rem;
      border: 2px solid #2a2a2a;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .channel-name { font-size: 1.5rem; color: #888; margin-bottom: 0.5rem; }
    
    .subscriber-number {
      font-size: 4.5rem;
      font-weight: 900;
      line-height: 1.1;
      display: flex;
      justify-content: center;
    }
    
    .digit-wrapper {
      display: inline-block;
      position: relative;
      overflow: hidden;
      width: 0.6em;
      height: 1.1em;
      vertical-align: bottom;
    }
    
    .digit-old, .digit-new {
      position: absolute;
      left: 0;
      width: 100%;
      text-align: center;
      background: linear-gradient(135deg, #ff4444, #ff8888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .digit-old {
      top: 0;
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.3s;
    }
    
    .digit-new {
      top: 100%;
      transition: top 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    
    .digit-new.static {
      top: 0;
      transition: none;
    }
    
    .space {
      display: inline-block;
      width: 0.3em;
    }
    
    .live-badge {
      display: inline-block;
      background: #ff0000;
      color: white;
      padding: 0.3rem 1rem;
      border-radius: 0.5rem;
      font-weight: 700;
      font-size: 0.85rem;
      margin-top: 1rem;
      animation: glow 1s infinite;
    }
    
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 5px #ff0000; }
      50% { box-shadow: 0 0 20px #ff0000; }
    }
    
    .error-message {
      color: #ff4444;
      background: rgba(255, 68, 68, 0.1);
      padding: 1rem;
      border-radius: 1rem;
      text-align: center;
      width: 100%;
    }
    
    .hidden { display: none !important; }
    
    @media (max-width: 600px) {
      .brand { font-size: 1.5rem; top: 1.5rem; left: 1.5rem; }
      .subscriber-number { font-size: 3rem; }
      .subscriber-card { padding: 2rem; }
      .search-box { flex-direction: column; }
      .api-counter { bottom: 1rem; right: 1rem; font-size: 0.7rem; }
    }
  </style>
</head>
<body>
  <div class="brand">LampoViews</div>
  
  <div class="api-counter" id="apiCounter">
    API сегодня:<br>
    <span id="quotaUsed">0</span> / 10 000
  </div>

  <div class="center-container">
    <div class="search-box">
      <input type="text" id="channelInput" class="channel-input" placeholder="Введите канал (@mrbeast)" autocomplete="off">
      <button id="searchBtn" class="search-btn">🔍 Искать</button>
    </div>

    <div id="errorEl" class="error-message hidden"></div>

    <div id="resultCard" class="subscriber-card hidden">
      <div class="channel-name" id="displayName">@RUSSLAN92K</div>
      <div class="subscriber-number" id="displaySubs"></div>
      <div class="live-badge">● LIVE</div>
    </div>
  </div>

  <script>
    const API_KEY = 'AIzaSyB9A_1cUmMm2SUeoBMlc7JeQUByAN7rCHU';
    let totalQueriesToday = 0;
    let currentChannel = '';
    let cachedSubscribers = 0;
    let apiTimer = null;
    let displayTimer = null;
    
    const channelInput = document.getElementById('channelInput');
    const searchBtn = document.getElementById('searchBtn');
    const errorEl = document.getElementById('errorEl');
    const resultCard = document.getElementById('resultCard');
    const displayName = document.getElementById('displayName');
    const displaySubs = document.getElementById('displaySubs');
    const quotaUsed = document.getElementById('quotaUsed');

    function formatNumber(num) {
      return num.toLocaleString('ru-RU');
    }

    function updateQuotaDisplay() {
      quotaUsed.textContent = formatNumber(totalQueriesToday);
    }

    function showError(text) {
      errorEl.textContent = '⚠️ ' + text;
      errorEl.classList.remove('hidden');
      resultCard.classList.add('hidden');
    }

    function animateSubscriberNumber(oldNumber, newNumber) {
      const oldStr = oldNumber.toString();
      const newStr = newNumber.toString();
      const newFormatted = formatNumber(newNumber);
      
      const maxLength = Math.max(oldStr.length, newStr.length);
      const paddedOld = oldStr.padStart(maxLength, '0');
      const paddedNew = newStr.padStart(maxLength, '0');
      
      let html = '';
      let digitIndex = 0;
      
      for (let i = 0; i < newFormatted.length; i++) {
        const char = newFormatted[i];
        
        if (char === ' ' || char === '\u00A0') {
          html += '<span class="space"></span>';
        } else {
          const oldChar = paddedOld[digitIndex];
          const newChar = paddedNew[digitIndex];
          
          if (oldChar !== newChar) {
            html += `
              <span class="digit-wrapper">
                <span class="digit-old">${oldChar}</span>
                <span class="digit-new">${newChar}</span>
              </span>
            `;
          } else {
            html += `
              <span class="digit-wrapper">
                <span class="digit-new static">${newChar}</span>
              </span>
            `;
          }
          
          digitIndex++;
        }
      }
      
      displaySubs.innerHTML = html;
      
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const wrappers = displaySubs.querySelectorAll('.digit-wrapper');
          
          wrappers.forEach(wrapper => {
            const oldDigit = wrapper.querySelector('.digit-old');
            const newDigit = wrapper.querySelector('.digit-new');
            
            if (oldDigit) {
              oldDigit.style.transform = 'translateY(-100%)';
              oldDigit.style.opacity = '0';
              newDigit.style.top = '0';
            }
          });
        });
      });
    }

    async function fetchChannelData(username) {
      totalQueriesToday++;
      updateQuotaDisplay();
      
      const response = await fetch(
        `https://www.googleapis.com/youtube/v3/channels?part=statistics,snippet&forHandle=${username}&key=${API_KEY}`
      );
      const data = await response.json();
      
      if (data.items && data.items.length > 0) {
        return {
          title: data.items[0].snippet.title,
          subscribers: parseInt(data.items[0].statistics.subscriberCount)
        };
      }
      
      throw new Error('Канал не найден');
    }

    async function updateCache() {
      if (!currentChannel) return;
      
      try {
        const data = await fetchChannelData(currentChannel);
        cachedSubscribers = data.subscribers;
        displayName.textContent = data.title;
      } catch (err) {
        console.error('Ошибка:', err);
      }
    }

    function updateDisplay() {
      if (cachedSubscribers > 0) {
        const currentDisplay = parseInt(displaySubs.textContent.replace(/\s/g, '')) || 0;
        
        if (currentDisplay !== cachedSubscribers) {
          animateSubscriberNumber(currentDisplay, cachedSubscribers);
        }
        
        resultCard.classList.remove('hidden');
        errorEl.classList.add('hidden');
      }
    }

    function startUpdates(username) {
      if (apiTimer) clearInterval(apiTimer);
      if (displayTimer) clearInterval(displayTimer);
      
      currentChannel = username;
      cachedSubscribers = 0;
      
      updateCache().then(() => {
        displaySubs.textContent = formatNumber(cachedSubscribers);
        displayName.textContent = '@' + currentChannel;
        resultCard.classList.remove('hidden');
        errorEl.classList.add('hidden');
      });
      
      apiTimer = setInterval(updateCache, 10000);
      displayTimer = setInterval(updateDisplay, 100);
    }

    function handleSearch() {
      let input = channelInput.value.trim();
      
      if (!input) {
        showError('Введите название канала');
        return;
      }
      
      input = input.replace(/^@/, '').replace(/\s+/g, '');
      
      if (!input) {
        showError('Некорректное название');
        return;
      }
      
      if (input.toLowerCase() === currentChannel.toLowerCase()) {
        resultCard.classList.remove('hidden');
        errorEl.classList.add('hidden');
        return;
      }
      
      startUpdates(input);
    }

    searchBtn.addEventListener('click', handleSearch);
    channelInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleSearch();
    });

    const saved = localStorage.getItem('lampo_queries');
    const savedDate = localStorage.getItem('lampo_date');
    const today = new Date().toDateString();
    
    if (saved && savedDate === today) {
      totalQueriesToday = parseInt(saved);
    }
    updateQuotaDisplay();

    setInterval(() => {
      localStorage.setItem('lampo_queries', totalQueriesToday);
      localStorage.setItem('lampo_date', new Date().toDateString());
    }, 30000);

    window.addEventListener('beforeunload', () => {
      if (apiTimer) clearInterval(apiTimer);
      if (displayTimer) clearInterval(displayTimer);
      localStorage.setItem('lampo_queries', totalQueriesToday);
      localStorage.setItem('lampo_date', new Date().toDateString());
    });
  </script>
</body>
</html>
